<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BM Tools - Delivery Schedule</title>

<link rel="icon" href="favicon.png">

<link rel="stylesheet" href="style.css">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</head>

<body>

<div class="container">

<h2>📦 Delivery Schedule Filter</h2>

<p class="subtitle">
👤 Rifqi Tools
</p>

<textarea
id="input"
placeholder="Paste isi chat WhatsApp di sini..."></textarea>

<div class="button-group">

<button onclick="filterStore()">
🔍 Filter
</button>

<button onclick="openSetting()">
⚙️ Store Setting
</button>

<button onclick="clearData()">
🗑 Clear
</button>

<button onclick="copyResult()">
📋 Copy
</button>

<button onclick="downloadJPG()">
🖼 JPG
</button>

</div>

<div id="progressContainer">

<div class="progress-title">

<span>📊 Progress Pengiriman</span>

<span id="progressText"></span>

</div>

<div class="progress">

<div id="progressBar"></div>

</div>

</div>

<div id="captureArea">

<div id="tanggal"></div>

<div id="hasil"></div>

</div>

</div>

<!-- ===================== -->
<!-- STORE SETTING MODAL -->
<!-- ===================== -->

<div id="settingModal" class="modal">

<div class="modal-content">

<h2>⚙️ Store Setting</h2>

<p>
Masukkan kode store.<br>
<b>Satu baris = satu store.</b>
</p>

<textarea
id="storeInput"
placeholder="Contoh:

BDIP
DBOT
CHPL
CIMA"></textarea>

<div class="modalButton">

<button onclick="saveStore()">

💾 Simpan

</button>

<button onclick="closeSetting()">

❌ Tutup

</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
